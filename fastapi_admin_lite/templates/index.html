<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <style>
        body { font-family: Arial; margin: 30px; }
        .card { padding: 15px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; }
        a { text-decoration: none; }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <p>Select a model:</p>

    {% for model in models %}
        <div class="card">
            <a href="{{ prefix }}/{{ model.__name__ }}">{{ model.__name__ }}</a>
        </div>
    {% endfor %}
</body>
</html>
