[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fastapi-admin-lite"
version = "0.1.0"
description = "FastAPI Admin Lite: auto-generated CRUD admin panel for FastAPI + SQLAlchemy."
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [{name="Kubenew"}]
keywords = ["fastapi", "admin", "crud", "sqlalchemy", "dashboard"]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Framework :: FastAPI",
  "Intended Audience :: Developers",
  "Topic :: Internet :: WWW/HTTP",
]

dependencies = [
  "fastapi>=0.100.0",
  "starlette>=0.27.0",
  "sqlalchemy>=2.0.0",
  "jinja2>=3.1.0",
  "uvicorn>=0.23.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0.0", "httpx>=0.24.0", "build>=1.0.0", "twine>=4.0.0"]

[project.urls]
Homepage = "https://github.com/Kubenew/fastapi-admin-lite"
Repository = "https://github.com/Kubenew/fastapi-admin-lite"

[tool.setuptools.packages.find]
where = ["."]
include = ["fastapi_admin_lite*"]
